<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>妙麗歲數計算機</title>
  <link rel="stylesheet" href="doggy.css" />
</head>
<body>
  <div class="container">
    <h1>妙麗歲數計算機</h1>

    <label for="birthDate">妙麗的出生年月日是：</label>
    <input type="date" id="birthDate" />

    <label for="targetDate">計算的日期：</label>
    <input type="date" id="targetDate" />

    <button id="calculateBtn">開始計算</button>

    <div id="result" class="result">
      妙麗現在大約 xxx 歲，換算人類年齡大約是 xxx 歲。
    </div>
  </div>

  <script src="doggy.js"></script>
</body>
</html>
